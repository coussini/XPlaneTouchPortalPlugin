<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">    
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
    <title>Creating Dataref JSON for Touch Portal X-Plane</title>
    <script>
        let datarefs = [];
        let oneId = 'XPlanePlugin.';
        let firstTime = true;
        function add_dataref()
        {
           var inpObj = document.getElementById("json-form");
           if (inpObj.checkValidity() == false) {
              return false;
           }
           else 
            {
                let objet_dataref = {
                    id: oneId.concat(document.getElementById('desc').value.replaceAll(' ','')),
                    desc: document.getElementById('desc').value,
                    group: document.getElementById('group').value,
                    type: document.getElementById('type').value,
                    value: document.getElementById('value').value,
                    dataref: document.getElementById('dataref').value,
                    comment: document.getElementById('comment').value
                }
                // sauvegarder object datarefs
                datarefs.push(objet_dataref);
                document.forms[0].reset(); // to clear the form for the next entries
                //document.querySelector('form').reset();

                //for display purposes only
                //console.warn('added' , {datarefs} );
                let pre = document.querySelector('#msg');
                pre.textContent = '\n' + JSON.stringify(datarefs, '\t', 2);
                //saving to localStorage
                localStorage.setItem('MyDatarefList', JSON.stringify(datarefs) );
            }
        }
        /*
        document.addEventListener('DOMContentLoaded', ()=>{
            document.getElementById('btn').addEventListener('click', addDataref);
        });
        */
    </script>

</head>
<body>
    <div class="container-fluid">
        <form id="json-form" class="needs-validation" novalidate>
            <div class="col-sm-3">
                <div class="form-group">
                    <label for="desc">dataref description</label>
                    <input type="text" class="form-control" id="desc" placeholder="description" aria-describedby="descHelp" required>
                    <small id="descHelp" class="form-text text-muted">Is important as Touch Portal choice</small>
                </div>
            </div>
            <div class="col-sm-3">
                <div class="form-group">
                    <label for="group">group</label>
                    <input type="text" class="form-control" id="group" placeholder="description" aria-describedby="groupHelp" required>
                    <small id="groupHelp" class="form-text text-muted">Is important into Touch Portal for grouping choices</small>
                </div>
            </div>
            <div class="col-sm-3">
                <div class="form-group">
                    <label for="type">type</label>
                    <select class="form-control" id="type" aria-describedby="typeHelp" required>
                      <option>int</option>
                      <option>float</option>
                    </select>
                    <small id="typeHelp" class="form-text text-muted">Must be int or float</small>
                </div>
            </div>
            <div class="col-sm-3">
                <div class="form-group">
                    <label for="value">value</label>
                    <input type="number" class="form-control" id="value" min="0" placeholder="0" aria-describedby="valueHelp" required>
                    <small id="valueHelp" class="form-text text-muted">Must be integer</small>
                </div>
            </div>
            <div class="col-sm-3">
                <div class="form-group">
                    <label for="dataref">dataref</label>
                    <input type="text" class="form-control" id="dataref" placeholder="description" aria-describedby="datarefHelp" required>
                    <small id="datarefHelp" class="form-text text-muted">For example AirbusFBW/ADIRUSwitchArray[1] or AirbusFBW/EnableExternalPower</small>
                </div>
            </div>
            <div class="col-sm-3">
                <div class="form-group">
                    <label for="group">comment</label>
                    <input type="text" class="form-control" id="comment" placeholder="0" aria-describedby="commentHelp" required>
                    <small id="commentHelp" class="form-text text-muted">Use a comment to enumarate whats values this datarefs use</small>
                </div>
            </div>
            <button  class="btn btn-primary" onclick = "add_dataref()">add dataref</button>
            <div class="formBox">
               <button onclick = "downloadFile()"> save result to dataref.json</button>
               <script>
                  const downloadFile = () => {
                     const link = document.createElement("a");
                     const begin = '{\n"datarefs": '
                     const middle = document.getElementsByTagName('textarea')[0].innerHTML;
                     const end = '\n}';
                     const content = begin.concat(middle).concat(end); 
                     console.log(JSON.stringify(content));
                     const file = new Blob([content], { type: 'text/plain' });
                     link.href = URL.createObjectURL(file);
                     link.download = "dataref.json";
                     link.click();
                     URL.revokeObjectURL(link.href);
                  };
               </script>        
            </div>
            <div class="col-sm-3">
                <textarea class="form-control" style="overflow-y: scroll;height: 100px;" id="msg"></textarea>
            </div>
            
        </form>
    </div>
    <script type="text/javascript">
        // Example starter JavaScript for disabling form submissions if there are invalid fields
        (function () {
          'use strict'

          // Fetch all the forms we want to apply custom Bootstrap validation styles to
          var forms = document.querySelectorAll('.needs-validation')

          // Loop over them and prevent submission
          Array.prototype.slice.call(forms)
            .forEach(function (form) {
              form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                  event.preventDefault()
                  event.stopPropagation()
                }

                form.classList.add('was-validated')
              }, false)
            })
        })()        
    </script>    
</body>
</html>
